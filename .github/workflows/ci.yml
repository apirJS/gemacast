name: CI Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Checks (TypeScript / Tauri)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('gemacast-mobile/bun.lock') }}
          restore-keys: bun-
      - name: Install Dependencies
        working-directory: ./gemacast-mobile
        run: bun install --frozen-lockfile
      - name: Prettier Format Check
        working-directory: ./gemacast-mobile
        run: bun run format:check
      - name: ESLint
        working-directory: ./gemacast-mobile
        run: bun run lint
      - name: TypeScript Typecheck
        working-directory: ./gemacast-mobile
        run: bun run typecheck
      - name: Bun Test
        working-directory: ./gemacast-mobile
        run: bun test

  backend:
    name: Backend Checks (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux PC
            os: ubuntu-22.04
            target: pc
          - name: Linux Android
            os: ubuntu-22.04
            target: android
          - name: Windows PC
            os: windows-latest
            target: pc
          - name: macOS PC
            os: macos-15
            target: pc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Add Android targets
        if: matrix.target == 'android'
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf libxdo-dev
      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK & NDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3
      - name: Install Pinned NDK & Build Tools
        if: matrix.target == 'android'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "BUILD_TOOLS_VERSION=34.0.0" >> $GITHUB_ENV
      - name: Rustfmt
        run: cargo fmt --check
      - name: Clippy PC
        if: matrix.target == 'pc'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy Android
        if: matrix.target == 'android'
        run: |
          cargo install cargo-ndk
          cargo ndk -t arm64-v8a clippy --workspace --exclude gemacast-pc -- -D warnings
      - name: Cargo Test
        if: matrix.target == 'pc'
        run: cargo test --workspace
