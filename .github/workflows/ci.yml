name: CI Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Checks (TypeScript / Tauri)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('gemacast-mobile/bun.lock') }}
          restore-keys: bun-
      - name: Install Dependencies
        working-directory: ./gemacast-mobile
        run: bun install --frozen-lockfile
      - name: Prettier Format Check
        working-directory: ./gemacast-mobile
        run: bun run format:check
      - name: ESLint
        working-directory: ./gemacast-mobile
        run: bun run lint
      - name: TypeScript Typecheck
        working-directory: ./gemacast-mobile
        run: bun run typecheck
      - name: Bun Test
        working-directory: ./gemacast-mobile
        run: bun test

  backend:
    name: Backend Checks (Rust)
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf libxdo-dev
      - name: Rustfmt
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo Test
        run: cargo test --workspace
