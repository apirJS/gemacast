name: Release Android (Tauri)

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    environment: Production
    # Only run when the Release workflow succeeded on a semver tag push (not a PR dry-run)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    env:
      RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('gemacast-mobile/bun.lock') }}
          restore-keys: bun-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
      
      - name: Install Pinned NDK (For Oboe C++ Bindings)
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Rust Mobile Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev libxdo-dev

      - name: Install Frontend Dependencies
        working-directory: ./gemacast-mobile
        run: bun install --frozen-lockfile

      - name: Sync package.json and tauri.conf.json version with Cargo.toml
        working-directory: ./gemacast-mobile
        run: |
          VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "Syncing versions to v$VERSION"
          bun --bun npm version $VERSION --no-git-tag-version
          # Sync tauri.conf.json version
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp && mv src-tauri/tauri.conf.tmp src-tauri/tauri.conf.json

      - name: Build Unsigned APK via Tauri
        working-directory: ./gemacast-mobile
        run: bunx tauri android build --apk

      - name: Cryptographically Sign APK
        uses: r0adkll/sign-android-release@v3
        id: sign_app
        with:
          releaseDirectory: gemacast-mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Archive Unsigned APK (Fallback)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gemacast-android-unsigned
          path: gemacast-mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release/*-unsigned.apk

      - name: Archive Signed APK
        uses: actions/upload-artifact@v7
        with:
          name: gemacast-android-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Upload SIGNED APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.sign_app.outputs.signedReleaseFile }}" --clobber
