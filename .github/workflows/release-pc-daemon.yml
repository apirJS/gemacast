name: Release PC Daemon

on:
  push:
    tags:
      - 'pc-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: pc-daemon.exe
            asset: pc-daemon-windows-x86_64.exe

          - name: macOS Apple Silicon
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: pc-daemon
            asset: pc-daemon-macos-aarch64

          - name: macOS Intel
            runner: macos-13
            target: x86_64-apple-darwin
            binary: pc-daemon
            asset: pc-daemon-macos-x86_64

          - name: Linux x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: pc-daemon
            asset: pc-daemon-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # tao + tray-icon need GTK3 and AppIndicator on Linux.
      # cpal needs ALSA. audiopus_sys needs cmake + pkg-config (uses system libopus if present).
      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            pkg-config \
            libopus-dev \
            cmake \
            ninja-build

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p pc-daemon

      - name: Stage artifact
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a release when triggered by a tag push, not manual dispatch.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
