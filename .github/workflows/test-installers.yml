name: Test Installers

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: test-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  # Synthetic version used for all installer packaging (never published)
  TEST_VERSION: "0.0.0"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build gemacast-pc release binaries for every target platform.
  # Produces archives as workflow artifacts (not GitHub Releases).
  # ─────────────────────────────────────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: gemacast-pc-x86_64-pc-windows-msvc.zip
            archive_cmd: 7z a
            adb_files: "adb.exe AdbWinApi.dll AdbWinUsbApi.dll"
          - name: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: gemacast-pc-x86_64-unknown-linux-gnu.tar.xz
            archive_cmd: tar -cJf
            adb_files: "adb"
          - name: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive: gemacast-pc-aarch64-unknown-linux-gnu.tar.xz
            archive_cmd: tar -cJf
            adb_files: "adb"
          - name: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin
            archive: gemacast-pc-x86_64-apple-darwin.tar.xz
            archive_cmd: tar -cJf
            adb_files: "adb"
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: gemacast-pc-aarch64-apple-darwin.tar.xz
            archive_cmd: tar -cJf
            adb_files: "adb"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: installer-test-${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf libxdo-dev ninja-build cmake

      - name: Install macOS dependencies
        if: contains(matrix.runner, 'macos')
        run: brew install ninja cmake

      - name: Install Windows dependencies
        if: contains(matrix.runner, 'windows')
        shell: pwsh
        run: |
          # Ninja and CMake are needed for vendored opus (audiopus_sys) build
          choco install ninja -y --no-progress
          # CMake is pre-installed on Windows runners via Visual Studio

      - name: Build gemacast-pc (release)
        run: cargo build --release --package gemacast-pc

      - name: Stage archive contents
        shell: bash
        run: |
          STAGE_DIR="archive-staging/gemacast-pc"
          mkdir -p "$STAGE_DIR"

          # Copy the binary
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/release/gemacast-pc.exe "$STAGE_DIR/"
          else
            cp target/release/gemacast-pc "$STAGE_DIR/"
          fi

          # Copy ADB files from the crate root (downloaded by build.rs)
          for f in ${{ matrix.adb_files }}; do
            if [ -f "gemacast-pc/$f" ]; then
              # Only copy non-empty files (build.rs creates empty stubs for other platforms)
              if [ -s "gemacast-pc/$f" ]; then
                cp "gemacast-pc/$f" "$STAGE_DIR/"
                echo "Bundled: $f ($(wc -c < "gemacast-pc/$f") bytes)"
              else
                echo "::error::$f is an empty stub — build.rs did not download ADB for this platform"
                exit 1
              fi
            else
              echo "::error::$f not found in gemacast-pc/"
              exit 1
            fi
          done

          echo "=== Archive contents ==="
          ls -la "$STAGE_DIR/"

      - name: Create archive (zip)
        if: contains(matrix.archive, '.zip')
        shell: bash
        working-directory: archive-staging
        run: 7z a "../${{ matrix.archive }}" gemacast-pc/

      - name: Create archive (tar.xz)
        if: contains(matrix.archive, '.tar.xz')
        shell: bash
        working-directory: archive-staging
        run: tar -cJf "../${{ matrix.archive }}" gemacast-pc/

      - name: Verify ADB in archive
        shell: bash
        run: |
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            listing=$(unzip -l "${{ matrix.archive }}" 2>/dev/null || true)
          else
            listing=$(tar -tf "${{ matrix.archive }}" 2>/dev/null || true)
          fi
          if ! echo "$listing" | grep -q 'adb'; then
            echo "::error::ADB not found in ${{ matrix.archive }}"
            exit 1
          fi
          echo "ADB verified in archive"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.name }}
          path: ${{ matrix.archive }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Test Windows MSI installer: build, install, verify, uninstall, verify cleanup
  # ─────────────────────────────────────────────────────────────────────────────
  test-msi:
    name: Test MSI Installer
    needs: build-binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Download Windows archive
        uses: actions/download-artifact@v8
        with:
          name: binary-windows-x64
          path: dist_download

      - name: Extract and stage binaries for WiX
        shell: pwsh
        run: |
          Expand-Archive -Path dist_download\*.zip -DestinationPath dist_extracted

          $stagingDir = "wix\msi\staging"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          $exe = Get-ChildItem -Path dist_extracted -Filter "gemacast-pc.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "gemacast-pc.exe not found"; exit 1 }
          Copy-Item $exe.FullName -Destination $stagingDir
          Write-Host "Staged: gemacast-pc.exe"

          foreach ($fileName in @("adb.exe", "AdbWinApi.dll", "AdbWinUsbApi.dll")) {
            $found = Get-ChildItem -Path dist_extracted -Filter $fileName -Recurse | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName -Destination $stagingDir
              Write-Host "Staged: $fileName"
            } else {
              Write-Error "$fileName not found in archive"
              exit 1
            }
          }

          Write-Host "`nStaging complete:"
          Get-ChildItem $stagingDir | Format-Table Name, Length

      - name: Install WiX v6
        run: dotnet tool install --global wix --version 6.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          $sourceDir = (Resolve-Path "wix\msi\staging").Path
          $iconDir   = (Resolve-Path "wix\assets").Path

          dotnet build wix\msi\msi.wixproj `
            -c Release `
            "-p:Version=$env:TEST_VERSION" `
            "-p:SourceDir=$sourceDir" `
            "-p:IconDir=$iconDir"

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $msi = Get-ChildItem -Path wix\msi\bin -Filter "*.msi" -Recurse | Select-Object -First 1
          if (-not $msi) { Write-Error "MSI was not produced"; exit 1 }

          Write-Host "MSI built: $($msi.FullName) ($([math]::Round($msi.Length / 1MB, 2)) MB)"
          echo "MSI_PATH=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install MSI silently
        shell: pwsh
        run: |
          Write-Host "Installing MSI..."
          $proc = Start-Process msiexec -ArgumentList "/i", "`"$env:MSI_PATH`"", "/qn", "/norestart" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "MSI install failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "MSI installed successfully"

      - name: Verify installation
        shell: pwsh
        run: |
          $installDir = "$env:ProgramFiles\Gemacast"
          $errors = @()

          # Check main executable
          if (-not (Test-Path "$installDir\gemacast-pc.exe")) {
            $errors += "gemacast-pc.exe not found in $installDir"
          } else {
            Write-Host "PASS: gemacast-pc.exe exists"
          }

          # Check ADB binaries
          foreach ($f in @("adb.exe", "AdbWinApi.dll", "AdbWinUsbApi.dll")) {
            if (-not (Test-Path "$installDir\$f")) {
              $errors += "$f not found in $installDir"
            } else {
              Write-Host "PASS: $f exists"
            }
          }

          # Check firewall rules
          $tcpRule = netsh advfirewall firewall show rule name="Gemacast (TCP)" 2>&1
          if ($tcpRule -match "Gemacast") {
            Write-Host "PASS: TCP firewall rule exists"
          } else {
            $errors += "TCP firewall rule 'Gemacast (TCP)' not found"
          }

          $udpRule = netsh advfirewall firewall show rule name="Gemacast (UDP)" 2>&1
          if ($udpRule -match "Gemacast") {
            Write-Host "PASS: UDP firewall rule exists"
          } else {
            $errors += "UDP firewall rule 'Gemacast (UDP)' not found"
          }

          # Check Start Menu shortcut
          $startMenu = "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\Gemacast.lnk"
          if (Test-Path $startMenu) {
            Write-Host "PASS: Start Menu shortcut exists"
          } else {
            # Try alternative location
            $altMenu = Get-ChildItem "$env:ProgramData\Microsoft\Windows\Start Menu\Programs" -Filter "*Gemacast*" -Recurse -ErrorAction SilentlyContinue
            if ($altMenu) {
              Write-Host "PASS: Start Menu shortcut found at $($altMenu.FullName)"
            } else {
              $errors += "Start Menu shortcut not found"
            }
          }

          # Smoke test: start the process briefly and verify it doesn't crash
          # gemacast-pc is a GUI tray app (#![windows_subsystem = "windows"]) so it
          # won't have a console, but it should start without immediately crashing.
          Write-Host "`nSmoke test: starting gemacast-pc.exe..."
          $proc = Start-Process -FilePath "$installDir\gemacast-pc.exe" -PassThru
          Start-Sleep -Seconds 5

          if ($proc.HasExited) {
            $errors += "gemacast-pc.exe exited prematurely with code $($proc.ExitCode)"
          } else {
            Write-Host "PASS: gemacast-pc.exe is running (PID $($proc.Id))"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Write-Host "Process killed after smoke test"
          }

          if ($errors.Count -gt 0) {
            Write-Host "`n=== FAILURES ==="
            $errors | ForEach-Object { Write-Host "FAIL: $_" }
            exit 1
          }
          Write-Host "`nAll installation checks passed"

      - name: Uninstall MSI silently
        shell: pwsh
        run: |
          Write-Host "Uninstalling MSI..."
          $proc = Start-Process msiexec -ArgumentList "/x", "`"$env:MSI_PATH`"", "/qn", "/norestart" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "MSI uninstall failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "MSI uninstalled successfully"

      - name: Verify uninstall cleanup
        shell: pwsh
        run: |
          $installDir = "$env:ProgramFiles\Gemacast"
          $errors = @()

          # Installation directory should be removed
          if (Test-Path $installDir) {
            $remaining = Get-ChildItem $installDir -Recurse
            if ($remaining.Count -gt 0) {
              $errors += "Installation directory still contains files: $($remaining.Name -join ', ')"
            } else {
              Write-Host "PASS: Installation directory is empty (will be removed)"
            }
          } else {
            Write-Host "PASS: Installation directory removed"
          }

          # Firewall rules should be cleaned up
          $tcpRule = netsh advfirewall firewall show rule name="Gemacast (TCP)" 2>&1
          if ($tcpRule -match "No rules match") {
            Write-Host "PASS: TCP firewall rule removed"
          } else {
            $errors += "TCP firewall rule still exists after uninstall"
          }

          $udpRule = netsh advfirewall firewall show rule name="Gemacast (UDP)" 2>&1
          if ($udpRule -match "No rules match") {
            Write-Host "PASS: UDP firewall rule removed"
          } else {
            $errors += "UDP firewall rule still exists after uninstall"
          }

          if ($errors.Count -gt 0) {
            Write-Host "`n=== FAILURES ==="
            $errors | ForEach-Object { Write-Host "FAIL: $_" }
            exit 1
          }
          Write-Host "`nAll uninstall checks passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Test Linux packages: .deb, .rpm, .AppImage for amd64 and arm64
  # ─────────────────────────────────────────────────────────────────────────────
  test-linux-packages:
    name: Test Linux Packages (${{ matrix.arch }})
    needs: build-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            artifact_name: binary-linux-amd64
            archive: gemacast-pc-x86_64-unknown-linux-gnu.tar.xz
            appimage_arch: x86_64
            runs_on: ubuntu-22.04
          - arch: arm64
            artifact_name: binary-linux-arm64
            archive: gemacast-pc-aarch64-unknown-linux-gnu.tar.xz
            appimage_arch: aarch64
            runs_on: ubuntu-22.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Download Linux archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: dist_download

      - name: Extract archive
        run: |
          mkdir -p dist_extracted
          tar -xJf dist_download/${{ matrix.archive }} -C dist_extracted --strip-components=1
          echo "=== Extracted files ==="
          ls -la dist_extracted/

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libfuse2 file libayatana-appindicator3-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libasound2-dev

      # ── .deb ────────────────────────────────────────────────────────────────
      - name: Build .deb package
        run: |
          PKG_NAME="gemacast-pc_${TEST_VERSION}_${{ matrix.arch }}"
          mkdir -p "${PKG_NAME}/DEBIAN"
          mkdir -p "${PKG_NAME}/usr/bin"
          mkdir -p "${PKG_NAME}/usr/lib/gemacast"
          mkdir -p "${PKG_NAME}/usr/share/applications"
          mkdir -p "${PKG_NAME}/usr/share/icons/hicolor/256x256/apps"

          cp dist_extracted/gemacast-pc "${PKG_NAME}/usr/bin/"
          chmod 755 "${PKG_NAME}/usr/bin/gemacast-pc"

          if [ -f dist_extracted/adb ]; then
            cp dist_extracted/adb "${PKG_NAME}/usr/lib/gemacast/"
            chmod 755 "${PKG_NAME}/usr/lib/gemacast/adb"
          fi

          cp linux/gemacast-pc.desktop "${PKG_NAME}/usr/share/applications/"
          cp linux/gemacast-pc.png "${PKG_NAME}/usr/share/icons/hicolor/256x256/apps/"

          # Control file — written field-by-field to avoid heredoc/YAML conflicts
          {
            echo "Package: gemacast-pc"
            echo "Version: ${TEST_VERSION}"
            echo "Section: sound"
            echo "Priority: optional"
            echo "Architecture: ${{ matrix.arch }}"
            echo "Maintainer: Test CI <test@ci.local>"
            echo "Description: Gemacast PC - installer test build"
          } > "${PKG_NAME}/DEBIAN/control"

          dpkg-deb --build --root-owner-group "${PKG_NAME}"
          echo "Built: ${PKG_NAME}.deb ($(du -h "${PKG_NAME}.deb" | cut -f1))"

      - name: Install .deb
        run: sudo dpkg -i "gemacast-pc_${TEST_VERSION}_${{ matrix.arch }}.deb"

      - name: Verify .deb installation
        run: |
          ERRORS=0

          # Binary installed
          if command -v gemacast-pc &>/dev/null; then
            echo "PASS: gemacast-pc is on PATH at $(which gemacast-pc)"
          else
            echo "FAIL: gemacast-pc not found on PATH"; ERRORS=$((ERRORS+1))
          fi

          # ADB installed
          if [ -x /usr/lib/gemacast/adb ]; then
            echo "PASS: /usr/lib/gemacast/adb exists and is executable"
          else
            echo "FAIL: /usr/lib/gemacast/adb missing or not executable"; ERRORS=$((ERRORS+1))
          fi

          # Desktop entry
          if [ -f /usr/share/applications/gemacast-pc.desktop ]; then
            echo "PASS: Desktop entry installed"
          else
            echo "FAIL: Desktop entry not found"; ERRORS=$((ERRORS+1))
          fi

          # Icon
          if [ -f /usr/share/icons/hicolor/256x256/apps/gemacast-pc.png ]; then
            echo "PASS: Application icon installed"
          else
            echo "FAIL: Application icon not found"; ERRORS=$((ERRORS+1))
          fi

          # Smoke test: run with xvfb (provides virtual display for the tray app)
          echo ""
          echo "Smoke test: starting gemacast-pc under xvfb..."
          xvfb-run --auto-servernum gemacast-pc &
          PID=$!
          sleep 5

          if kill -0 $PID 2>/dev/null; then
            echo "PASS: gemacast-pc is running (PID $PID)"
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
          else
            echo "FAIL: gemacast-pc exited prematurely"; ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "=== $ERRORS check(s) failed ==="
            exit 1
          fi
          echo ""
          echo "All .deb installation checks passed"

      - name: Uninstall .deb
        run: sudo dpkg -r gemacast-pc

      - name: Verify .deb uninstall
        run: |
          ERRORS=0

          if command -v gemacast-pc &>/dev/null; then
            echo "FAIL: gemacast-pc still on PATH after uninstall"; ERRORS=$((ERRORS+1))
          else
            echo "PASS: gemacast-pc removed from PATH"
          fi

          if [ -f /usr/lib/gemacast/adb ]; then
            echo "FAIL: /usr/lib/gemacast/adb still exists"; ERRORS=$((ERRORS+1))
          else
            echo "PASS: ADB binary removed"
          fi

          if [ -f /usr/share/applications/gemacast-pc.desktop ]; then
            echo "FAIL: Desktop entry still exists"; ERRORS=$((ERRORS+1))
          else
            echo "PASS: Desktop entry removed"
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "=== $ERRORS uninstall check(s) failed ==="
            exit 1
          fi
          echo "All .deb uninstall checks passed"

      # ── .rpm via alien ──────────────────────────────────────────────────────
      - name: Build .rpm package
        run: |
          sudo apt-get install -y alien rpm
          DEB_FILE="gemacast-pc_${TEST_VERSION}_${{ matrix.arch }}.deb"
          sudo alien --to-rpm --scripts "$DEB_FILE"
          RPM_FILE=$(ls *.rpm | head -1)
          mv "$RPM_FILE" "gemacast-pc-${TEST_VERSION}.${{ matrix.appimage_arch }}.rpm"
          echo "Built: gemacast-pc-${TEST_VERSION}.${{ matrix.appimage_arch }}.rpm"

      - name: Verify .rpm structure
        run: |
          RPM_FILE="gemacast-pc-${TEST_VERSION}.${{ matrix.appimage_arch }}.rpm"

          # Verify RPM is a valid package
          rpm -qip "$RPM_FILE"

          # List contents and verify key files are present
          CONTENTS=$(rpm -qlp "$RPM_FILE")
          echo "$CONTENTS"

          ERRORS=0
          if echo "$CONTENTS" | grep -q "gemacast-pc"; then
            echo "PASS: Binary found in RPM"
          else
            echo "FAIL: Binary not found in RPM"; ERRORS=$((ERRORS+1))
          fi

          if echo "$CONTENTS" | grep -q "adb"; then
            echo "PASS: ADB found in RPM"
          else
            echo "FAIL: ADB not found in RPM"; ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "All .rpm checks passed"

      # ── .AppImage ───────────────────────────────────────────────────────────
      - name: Build AppImage
        env:
          ARCH: ${{ matrix.appimage_arch }}
        run: |
          APPDIR="Gemacast.AppDir"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp dist_extracted/gemacast-pc "$APPDIR/usr/bin/"

          if [ -f dist_extracted/adb ]; then
            ADB_ARCH=$(file dist_extracted/adb | grep -oP 'ELF \d+-bit .+?, \K[^,]+')
            if echo "$ADB_ARCH" | grep -qi "$ARCH\|$([ "$ARCH" = "x86_64" ] && echo 'X86-64' || echo 'AArch64')"; then
              cp dist_extracted/adb "$APPDIR/usr/bin/"
            else
              echo "Skipping adb (arch mismatch: $ADB_ARCH vs target $ARCH)"
            fi
          fi
          chmod +x "$APPDIR/usr/bin/"*

          cp linux/gemacast-pc.desktop "$APPDIR/"
          cp linux/gemacast-pc.desktop "$APPDIR/usr/share/applications/"
          cp linux/gemacast-pc.png "$APPDIR/gemacast-pc.png"
          cp linux/gemacast-pc.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/gemacast-pc.png"
          cp linux/gemacast-pc.png "$APPDIR/.DirIcon"

          # Create AppRun — written via printf to avoid heredoc/YAML conflicts
          printf '#!/bin/bash\nSELF="$(readlink -f "$0")"\nHERE="${SELF%%/*}"\nexport PATH="${HERE}/usr/bin:${PATH}"\nexec "${HERE}/usr/bin/gemacast-pc" "$@"\n' > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${ARCH}.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run --no-appstream "$APPDIR" \
            "gemacast-pc-${TEST_VERSION}-${ARCH}.AppImage"

      - name: Verify AppImage
        env:
          ARCH: ${{ matrix.appimage_arch }}
        run: |
          APPIMAGE="gemacast-pc-${TEST_VERSION}-${ARCH}.AppImage"
          ERRORS=0

          # Verify file exists and is executable
          if [ -x "$APPIMAGE" ]; then
            echo "PASS: AppImage is executable"
          else
            echo "FAIL: AppImage is not executable"; ERRORS=$((ERRORS+1))
          fi

          # Verify it's a valid AppImage (has magic bytes)
          if file "$APPIMAGE" | grep -qi "elf\|appimage\|executable"; then
            echo "PASS: AppImage is a valid ELF binary"
          else
            echo "FAIL: AppImage doesn't appear to be a valid binary"; ERRORS=$((ERRORS+1))
          fi

          # Extract and verify contents
          ./"$APPIMAGE" --appimage-extract 2>/dev/null || true
          if [ -f squashfs-root/usr/bin/gemacast-pc ]; then
            echo "PASS: gemacast-pc binary found inside AppImage"
          else
            echo "FAIL: gemacast-pc binary not found inside AppImage"; ERRORS=$((ERRORS+1))
          fi

          if [ -f squashfs-root/usr/bin/adb ]; then
            echo "PASS: ADB binary found inside AppImage"
          else
            echo "WARN: ADB binary not found inside AppImage (may be arch mismatch)"
          fi

          # Smoke test: run under xvfb
          echo ""
          echo "Smoke test: running AppImage under xvfb..."
          xvfb-run --auto-servernum ./"$APPIMAGE" --appimage-extract-and-run &
          PID=$!
          sleep 5

          if kill -0 $PID 2>/dev/null; then
            echo "PASS: AppImage process is running (PID $PID)"
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
          else
            echo "FAIL: AppImage process exited prematurely"; ERRORS=$((ERRORS+1))
          fi

          rm -rf squashfs-root

          if [ $ERRORS -gt 0 ]; then
            echo "=== $ERRORS AppImage check(s) failed ==="
            exit 1
          fi
          echo "All AppImage checks passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Test macOS .dmg and .app bundles (x64, arm64, universal via lipo)
  # ─────────────────────────────────────────────────────────────────────────────
  test-macos-dmg:
    name: Test macOS DMG & App Bundle
    needs: build-binaries
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Download macOS archives
        uses: actions/download-artifact@v8
        with:
          pattern: binary-macos-*
          path: mac_download
          merge-multiple: true

      - name: Extract archives
        run: |
          mkdir -p mac_x64 mac_arm64
          tar -xJf mac_download/*x86_64*.tar.xz -C mac_x64 --strip-components=1
          tar -xJf mac_download/*aarch64*.tar.xz -C mac_arm64 --strip-components=1
          echo "=== x64 ==="
          ls -la mac_x64/
          echo "=== arm64 ==="
          ls -la mac_arm64/

      - name: Install create-dmg
        run: brew install create-dmg

      # ── Per-architecture .app bundles ─────────────────────────────────────
      - name: Create .app bundles
        run: |
          for ARCH in x64:mac_x64 aarch64:mac_arm64; do
            ARCH_NAME="${ARCH%%:*}"
            ARCH_DIR="${ARCH##*:}"

            APP="Gemacast-${ARCH_NAME}.app"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

            cp "$ARCH_DIR/gemacast-pc" "$APP/Contents/MacOS/"
            [ -f "$ARCH_DIR/adb" ] && cp "$ARCH_DIR/adb" "$APP/Contents/MacOS/"
            chmod +x "$APP/Contents/MacOS/"*

            sed "s/VERSION_PLACEHOLDER/$TEST_VERSION/g" macos/Info.plist > "$APP/Contents/Info.plist"
            cp gemacast-mobile/src-tauri/icons/icon.icns "$APP/Contents/Resources/AppIcon.icns"
            echo "Created: $APP"
          done

      # ── Universal binary via lipo ─────────────────────────────────────────
      - name: Create universal .app bundle
        run: |
          APP="Gemacast-universal.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          lipo -create -output "$APP/Contents/MacOS/gemacast-pc" \
            mac_x64/gemacast-pc mac_arm64/gemacast-pc

          # ADB: attempt lipo for universal binary, fallback to single-arch copy
          if [ -f mac_x64/adb ] && [ -f mac_arm64/adb ]; then
            lipo -create -output "$APP/Contents/MacOS/adb" mac_x64/adb mac_arm64/adb 2>/dev/null \
              || cp mac_x64/adb "$APP/Contents/MacOS/"
          elif [ -f mac_x64/adb ]; then
            cp mac_x64/adb "$APP/Contents/MacOS/"
          elif [ -f mac_arm64/adb ]; then
            cp mac_arm64/adb "$APP/Contents/MacOS/"
          fi
          chmod +x "$APP/Contents/MacOS/"*

          sed "s/VERSION_PLACEHOLDER/$TEST_VERSION/g" macos/Info.plist > "$APP/Contents/Info.plist"
          cp gemacast-mobile/src-tauri/icons/icon.icns "$APP/Contents/Resources/AppIcon.icns"

          echo "Universal binary architectures:"
          lipo -info "$APP/Contents/MacOS/gemacast-pc"

      # ── Create .app.tar.gz archives ───────────────────────────────────────
      - name: Create .app.tar.gz archives
        run: |
          tar -czf "gemacast-pc-x64-apple-darwin.app.tar.gz" "Gemacast-x64.app"
          tar -czf "gemacast-pc-aarch64-apple-darwin.app.tar.gz" "Gemacast-aarch64.app"
          tar -czf "gemacast-pc-universal-apple-darwin.app.tar.gz" "Gemacast-universal.app"
          echo "Created .app.tar.gz archives:"
          ls -lh *.app.tar.gz

      # ── Create .dmg files ─────────────────────────────────────────────────
      - name: Create DMG files
        run: |
          for VARIANT in x64 aarch64 universal; do
            create-dmg \
              --volname "Gemacast" \
              --volicon "gemacast-mobile/src-tauri/icons/icon.icns" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "Gemacast-${VARIANT}.app" 150 190 \
              --app-drop-link 450 190 \
              --hide-extension "Gemacast-${VARIANT}.app" \
              "gemacast-pc-${VARIANT}-apple-darwin.dmg" \
              "Gemacast-${VARIANT}.app" || true
            # create-dmg returns non-zero when code signing is skipped; expected for unsigned builds

            # Verify the DMG was actually produced despite the || true
            if [ ! -f "gemacast-pc-${VARIANT}-apple-darwin.dmg" ] || [ ! -s "gemacast-pc-${VARIANT}-apple-darwin.dmg" ]; then
              echo "::error::DMG was not produced by create-dmg for $VARIANT"
              exit 1
            fi
          done
          echo "Created DMG files:"
          ls -lh *.dmg

      # ── Verify .app bundles ───────────────────────────────────────────────
      - name: Verify .app bundle structure
        run: |
          ERRORS=0

          for VARIANT in x64 aarch64 universal; do
            APP="Gemacast-${VARIANT}.app"
            echo "--- Verifying $APP ---"

            # Check bundle structure
            if [ -f "$APP/Contents/MacOS/gemacast-pc" ]; then
              echo "PASS: Binary exists"
            else
              echo "FAIL: Binary missing"; ERRORS=$((ERRORS+1))
            fi

            if [ -f "$APP/Contents/Info.plist" ]; then
              echo "PASS: Info.plist exists"
              # Verify bundle ID
              BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP/Contents/Info.plist")
              if [ "$BUNDLE_ID" = "com.apir.gemacast" ]; then
                echo "PASS: Bundle ID is com.apir.gemacast"
              else
                echo "FAIL: Bundle ID is '$BUNDLE_ID', expected 'com.apir.gemacast'"; ERRORS=$((ERRORS+1))
              fi
              # Verify version
              BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist")
              if [ "$BUNDLE_VERSION" = "$TEST_VERSION" ]; then
                echo "PASS: Version is $TEST_VERSION"
              else
                echo "FAIL: Version is '$BUNDLE_VERSION', expected '$TEST_VERSION'"; ERRORS=$((ERRORS+1))
              fi
            else
              echo "FAIL: Info.plist missing"; ERRORS=$((ERRORS+1))
            fi

            if [ -f "$APP/Contents/Resources/AppIcon.icns" ]; then
              echo "PASS: App icon exists"
            else
              echo "FAIL: App icon missing"; ERRORS=$((ERRORS+1))
            fi

            if [ -f "$APP/Contents/MacOS/adb" ]; then
              echo "PASS: ADB binary bundled"
            else
              echo "WARN: ADB binary not bundled in $VARIANT"
            fi

            echo ""
          done

          # Verify universal binary contains both architectures
          ARCHES=$(lipo -info "Gemacast-universal.app/Contents/MacOS/gemacast-pc" 2>&1)
          if echo "$ARCHES" | grep -q "x86_64" && echo "$ARCHES" | grep -q "arm64"; then
            echo "PASS: Universal binary contains both x86_64 and arm64"
          else
            echo "FAIL: Universal binary missing architectures: $ARCHES"; ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "=== $ERRORS check(s) failed ==="
            exit 1
          fi
          echo "All .app bundle checks passed"

      # ── Verify DMG mount + install ────────────────────────────────────────
      - name: Verify DMG (mount, install, smoke test, unmount)
        run: |
          ERRORS=0

          # Test with the universal DMG (covers lipo + packaging)
          DMG="gemacast-pc-universal-apple-darwin.dmg"
          echo "=== Testing $DMG ==="

          # Mount
          MOUNT_OUTPUT=$(hdiutil attach "$DMG" -nobrowse -noverify 2>&1)
          echo "$MOUNT_OUTPUT"
          MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | grep '/Volumes/' | awk '{print $NF}')

          if [ -z "$MOUNT_POINT" ]; then
            # Try alternative parsing
            MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | tail -1 | sed 's/.*\(\/Volumes\/.*\)/\1/')
          fi

          echo "Mounted at: $MOUNT_POINT"

          # Verify .app exists in DMG
          APP_IN_DMG=$(find "$MOUNT_POINT" -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_IN_DMG" ]; then
            echo "PASS: .app found in DMG: $APP_IN_DMG"
          else
            echo "FAIL: No .app found in DMG"; ERRORS=$((ERRORS+1))
          fi

          # Simulate drag-to-install
          if [ -n "$APP_IN_DMG" ]; then
            cp -R "$APP_IN_DMG" /tmp/Gemacast-test.app
            # Remove quarantine flag (unsigned app)
            xattr -dr com.apple.quarantine /tmp/Gemacast-test.app 2>/dev/null || true

            # Smoke test: start the binary
            echo "Smoke test: starting gemacast-pc from installed .app..."
            /tmp/Gemacast-test.app/Contents/MacOS/gemacast-pc &
            PID=$!
            sleep 5

            if kill -0 $PID 2>/dev/null; then
              echo "PASS: gemacast-pc is running from .app (PID $PID)"
              kill $PID 2>/dev/null || true
              wait $PID 2>/dev/null || true
            else
              echo "FAIL: gemacast-pc exited prematurely"; ERRORS=$((ERRORS+1))
            fi

            rm -rf /tmp/Gemacast-test.app
          fi

          # Unmount
          hdiutil detach "$MOUNT_POINT" -quiet 2>/dev/null || hdiutil detach "$MOUNT_POINT" -force 2>/dev/null || true
          echo "DMG unmounted"

          # Verify all DMG files exist and are valid
          for V in x64 aarch64 universal; do
            F="gemacast-pc-${V}-apple-darwin.dmg"
            if [ -f "$F" ] && [ -s "$F" ]; then
              echo "PASS: $F exists ($(du -h "$F" | cut -f1))"
            else
              echo "FAIL: $F missing or empty"; ERRORS=$((ERRORS+1))
            fi
          done

          # Verify .app.tar.gz archives can be extracted
          for V in x64 aarch64 universal; do
            F="gemacast-pc-${V}-apple-darwin.app.tar.gz"
            if tar -tzf "$F" | grep -q "gemacast-pc"; then
              echo "PASS: $F contains gemacast-pc binary"
            else
              echo "FAIL: $F doesn't contain expected binary"; ERRORS=$((ERRORS+1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "=== $ERRORS check(s) failed ==="
            exit 1
          fi
          echo "All macOS installer checks passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Test Android APK: build, start emulator, install, launch, verify
  # ─────────────────────────────────────────────────────────────────────────────
  test-android-apk:
    name: Test Android APK
    # No dependency on build-binaries — APK builds from source and runs in parallel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('gemacast-mobile/bun.lock') }}
          restore-keys: bun-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Pinned NDK & Build Tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;25.2.9519653" "cmake;3.22.1" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Rust Mobile Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: installer-test-android

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev libxdo-dev

      - name: Install Frontend Dependencies
        working-directory: ./gemacast-mobile
        run: bun install --frozen-lockfile

      - name: Sync version with Cargo.toml
        working-directory: ./gemacast-mobile
        run: |
          VERSION=$(grep '^version = ' ../Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "Syncing versions to v$VERSION"
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp.json && mv package.tmp.json package.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp && mv src-tauri/tauri.conf.tmp src-tauri/tauri.conf.json

      - name: Build APK via Tauri (debug-signed for emulator testing)
        working-directory: ./gemacast-mobile
        run: bunx tauri android build --apk --debug

      - name: Locate and verify APK
        id: apk
        run: |
          APK_PATH=$(find gemacast-mobile/src-tauri/gen/android -name "*.apk" -not -name "*unaligned*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found in build output"
            exit 1
          fi
          echo "APK found: $APK_PATH ($(du -h "$APK_PATH" | cut -f1))"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

          # Verify APK metadata
          AAPT2=$(find "$ANDROID_HOME/build-tools" -name "aapt2" | sort -V | tail -1)
          "$AAPT2" dump badging "$APK_PATH" | head -20

          # Verify package name
          PKG=$("$AAPT2" dump badging "$APK_PATH" | grep "package:" | head -1)
          if echo "$PKG" | grep -q "com.apir.gemacast"; then
            echo "PASS: Package name is com.apir.gemacast"
          else
            echo "FAIL: Unexpected package name: $PKG"
            exit 1
          fi

          # Verify min SDK
          if echo "$PKG" | grep -q "compileSdkVersion"; then
            echo "PASS: APK has expected SDK info"
          fi

      - name: Install and launch APK on emulator
        uses: reactivecircus/android-emulator-runner@v2.36.0
        with:
          api-level: 30
          arch: x86_64
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            echo "=== Emulator booted ==="

            # Install the APK (debug-signed, --no-streaming for compatibility)
            adb install -t "$APK_PATH"
            echo "PASS: APK installed successfully"

            # Launch the main activity
            adb shell am start -n com.apir.gemacast/.MainActivity
            echo "Activity started"

            # Wait for the app to initialize
            sleep 10

            # Verify the app process is running
            PID=$(adb shell pidof com.apir.gemacast || true); [ -n "$PID" ] && echo "PASS: App is running (PID $PID)" || { echo "FAIL: App process not found"; adb logcat -d -t 50 '*:E' 2>/dev/null | grep -i "gemacast\|fatal\|crash" || true; exit 1; }

            # Verify activity is in the task stack
            ACTIVITY_INFO=$(adb shell dumpsys activity activities 2>/dev/null | grep "com.apir.gemacast" | head -5); [ -n "$ACTIVITY_INFO" ] && echo "PASS: Activity found in activity stack" && echo "$ACTIVITY_INFO" || echo "WARN: Activity not found in activity stack (may be expected for background service apps)"

            # Uninstall
            adb shell pm uninstall com.apir.gemacast
            echo "PASS: APK uninstalled"

            # Verify uninstall
            STILL_INSTALLED=$(adb shell pm list packages 2>/dev/null | grep "com.apir.gemacast" || true); [ -z "$STILL_INSTALLED" ] && echo "PASS: Package fully removed" || { echo "FAIL: Package still listed after uninstall"; exit 1; }

            echo ""
            echo "All Android APK checks passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary gate — ensures all test jobs passed
  # ─────────────────────────────────────────────────────────────────────────────
  installer-tests-passed:
    name: All Installer Tests Passed
    needs:
      - test-msi
      - test-linux-packages
      - test-macos-dmg
      - test-android-apk
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Check results
        run: |
          echo "=== Installer Test Results ==="
          echo "MSI:            ${{ needs.test-msi.result }}"
          echo "Linux packages: ${{ needs.test-linux-packages.result }}"
          echo "macOS DMG:      ${{ needs.test-macos-dmg.result }}"
          echo "Android APK:    ${{ needs.test-android-apk.result }}"
          echo ""

          FAILED=0
          for result in \
            "${{ needs.test-msi.result }}" \
            "${{ needs.test-linux-packages.result }}" \
            "${{ needs.test-macos-dmg.result }}" \
            "${{ needs.test-android-apk.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              FAILED=$((FAILED+1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED installer test job(s) failed"
            exit 1
          fi
          echo "All installer tests passed!"
