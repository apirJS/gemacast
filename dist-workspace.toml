[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# No CLI-based installers — this is a desktop tray app, not a CLI tool.
# Platform-specific installers (.msi, .deb, .rpm, .dmg, .AppImage) are built
# by dedicated post-build jobs in the release workflow.
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# No publish jobs — homebrew formula publishing has been removed
publish-jobs = []
# Whether to install an updater program
install-updater = false
# Skip checking whether the specified configuration files are up to date
allow-dirty = ["ci", "msi"]

[dist.dependencies.apt]
"libwebkit2gtk-4.1-dev" = "*"
"libgtk-3-dev" = "*"
"libayatana-appindicator3-dev" = "*"
librsvg2-dev = "*"
patchelf = "*"
libasound2-dev = "*"
libxdo-dev = "*"
